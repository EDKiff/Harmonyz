name: Release and Version

on:
    push:
        branches:
            - main

permissions:
    contents: write

jobs:
    lint:
        name: Lint and Build
        uses: ./.github/workflows/lint_and_build.yml

    version-and-tag:
        name: Increment Version and Create Tag
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"

            - name: Configure git
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"

            - name: Get commit message
              id: commit
              run: echo "MESSAGE=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

            - name: Get current version
              id: current
              run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

            - name: Check if version tag already exists
              id: tag_exists
              run: |
                  if git rev-parse v${{ steps.current.outputs.VERSION }} >/dev/null 2>&1; then
                    echo "EXISTS=true" >> $GITHUB_OUTPUT
                  else
                    echo "EXISTS=false" >> $GITHUB_OUTPUT
                  fi

            - name: Increment version and create tag
              if: steps.tag_exists.outputs.EXISTS == 'false'
              run: |
                  npm version patch --no-git-tag-version
                  git add package.json package-lock.json
                  NEW_VERSION=$(node -p "require('./package.json').version")
                  git commit -m "chore: bump version to $NEW_VERSION"
                  git tag "v$NEW_VERSION"
                  git push origin main
                  git push origin "v$NEW_VERSION"

            - name: Version already tagged
              if: steps.tag_exists.outputs.EXISTS == 'true'
              run: echo "Version v${{ steps.current.outputs.VERSION }} already tagged. Skipping version bump."

    build-image:
        name: Build and Push Docker Image
        uses: ./.github/workflows/build_image.yml
        needs: version-and-tag
        if: needs.version-and-tag.result == 'success'
