name: Release and Version

on:
    push:
        branches:
            - main

permissions:
    contents: write

jobs:
    lint:
        name: Lint Code
        uses: ./.github/workflows/lint.yml

    version-and-tag:
        name: Increment Version and Create Tag
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"

            - name: Configure git
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"

            - name: Get commit message
              id: commit
              run: echo "MESSAGE=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

            - name: Check if this is a version bump commit
              id: should_skip
              run: |
                  if [[ "${{ steps.commit.outputs.MESSAGE }}" == *"chore: bump version"* ]]; then
                    echo "SKIP=true" >> $GITHUB_OUTPUT
                  else
                    echo "SKIP=false" >> $GITHUB_OUTPUT
                  fi

            - name: Get current version
              id: current
              run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

            - name: Check if version tag already exists
              id: tag_exists
              run: |
                  if git rev-parse v${{ steps.current.outputs.VERSION }} >/dev/null 2>&1; then
                    echo "EXISTS=true" >> $GITHUB_OUTPUT
                  else
                    echo "EXISTS=false" >> $GITHUB_OUTPUT
                  fi

            - name: Increment version and create tag
              if: steps.should_skip.outputs.SKIP == 'false' && steps.tag_exists.outputs.EXISTS == 'false'
              run: |
                  npm version patch --no-git-tag-version
                  git add package.json package-lock.json
                  NEW_VERSION=$(node -p "require('./package.json').version")
                  git commit -m "chore: bump version to $NEW_VERSION"
                  git tag "v$NEW_VERSION"
                  git push origin main
                  git push origin "v$NEW_VERSION"

            - name: Version already tagged
              if: steps.tag_exists.outputs.EXISTS == 'true'
              run: echo "Version v${{ steps.current.outputs.VERSION }} already tagged. Skipping version bump."

            - name: Version bump skipped
              if: steps.should_skip.outputs.SKIP == 'true'
              run: echo "Version bump commit detected. Skipping to prevent self-triggered workflow."
