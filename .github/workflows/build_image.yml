name: Build image Pipeline

on:
    workflow_call:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-and-push:
        name: Build and Push Docker Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set lowercase image name
              id: image
              run: echo "NAME=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build project
              run: npm run build

            - name: Get version from package.json
              id: version
              run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: ${{ steps.image.outputs.NAME }}:${{ steps.version.outputs.VERSION }}
                  cache-from: type=registry,ref=${{ steps.image.outputs.NAME }}:buildcache
                  cache-to: type=registry,ref=${{ steps.image.outputs.NAME }}:buildcache,mode=max
